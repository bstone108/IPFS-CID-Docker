apiVersion: v1
kind: Namespace
metadata:
  name: ipfs-cid-docker
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ipfs-cid-docker-config
  namespace: ipfs-cid-docker
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipfs-cid-docker
  namespace: ipfs-cid-docker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ipfs-cid-docker
  template:
    metadata:
      labels:
        app: ipfs-cid-docker
    spec:
      containers:
        - name: ipfs-cid-docker
          image: ghcr.io/bstone108/ipfs-cid-docker:latest
          imagePullPolicy: Always
          env:
            - name: CONFIG_PATH
              value: /config
            - name: RESCAN_INTERVAL
              value: 15m
            - name: SCAN_PRIORITY
              value: low
            - name: SCAN_PATHS
              value: /mnt
          ports:
            - name: swarm-tcp
              containerPort: 4001
              protocol: TCP
            - name: swarm-udp
              containerPort: 4001
              protocol: UDP
            - name: api
              containerPort: 5001
              protocol: TCP
            - name: gateway
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: scan-whatever
              mountPath: /mnt/whatever
              readOnly: true
            - name: scan-media
              mountPath: /mnt/media
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: ipfs-cid-docker-config
        - name: scan-whatever
          hostPath:
            path: /stuff/stupidity/whatever
            type: Directory
        - name: scan-media
          hostPath:
            path: /other/media
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: ipfs-cid-docker
  namespace: ipfs-cid-docker
spec:
  type: NodePort
  selector:
    app: ipfs-cid-docker
  ports:
    - name: swarm-tcp
      port: 4001
      targetPort: swarm-tcp
      protocol: TCP
      nodePort: 30001
    - name: swarm-udp
      port: 4001
      targetPort: swarm-udp
      protocol: UDP
      nodePort: 30002
    - name: api
      port: 5001
      targetPort: api
      protocol: TCP
      nodePort: 30051
    - name: gateway
      port: 8080
      targetPort: gateway
      protocol: TCP
      nodePort: 30080
